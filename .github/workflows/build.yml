name: Build TWA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build TWA
        uses: GoogleChromeLabs/bubblewrap-action@v0.0.2
        with:
          twa-manifest-path: ./twa-manifest.json
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: app-release-signed.aab
